<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2-week DSA pattern mastery</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --container-bg: #262626;
            --text-main: #ffffff;
            --text-secondary: #aaaaaa;
            --text-dim: #777777;
            --accent-primary: #8a7aff;
            --accent-secondary: #00ffaa;
            --card-border: #3a3a3a;
            --card-hover: #333333;
            --tag-bg: #333333;
            --platform-bg: #111111;
            --platform-text: #cccccc;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .main-container {
            width: 100%;
            max-width: 1200px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 0;
        }

        header .subtitle {
            color: var(--text-secondary);
            margin-top: 5px;
        }

        .header-dots {
            color: var(--text-dim);
            font-size: 24px;
            cursor: pointer;
        }

        .week-container {
            margin-bottom: 30px;
        }

        h2.week-title {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .day-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 15px;
        }

        .day-card {
            background-color: var(--container-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s, box-shadow 0.2s;
            position: relative;
        }

        .day-card:hover {
            background-color: var(--card-hover);
        }

        .day-card.active {
            border-color: var(--accent-primary);
            box-shadow: 0 0 10px rgba(138, 122, 255, 0.3);
        }

        .day-card.active .card-pattern {
            color: var(--accent-primary);
        }

        .day-num {
            color: var(--text-secondary);
            font-size: 12px;
            margin-bottom: 5px;
        }

        .card-pattern {
            color: var(--text-main);
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-top: 5px;
        }

        .status-dot.active {
            background-color: var(--accent-primary);
        }

        /* Detail Area */
        .detail-area {
            display: none;
            /* Initially hidden */
            background-color: var(--container-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 30px;
            margin-top: 20px;
        }

        .detail-area.visible {
            display: block;
        }

        .detail-header {
            margin-bottom: 25px;
        }

        .detail-day-tag {
            background-color: var(--accent-primary);
            color: white;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 15px;
        }

        .detail-title {
            font-size: 36px;
            font-weight: 700;
            margin: 0 0 10px 0;
        }

        .detail-subtitle {
            color: var(--text-secondary);
            font-size: 16px;
            margin-bottom: 20px;
        }

        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
        }

        .detail-tag {
            background-color: var(--tag-bg);
            color: var(--text-secondary);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 14px;
            cursor: default;
        }

        .sub-header {
            color: var(--text-secondary);
            text-transform: uppercase;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
            margin-top: 30px;
        }

        .platforms-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .platform-card {
            background-color: var(--platform-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 20px;
        }

        .platform-title {
            color: var(--platform-text);
            text-transform: uppercase;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 15px;
            border-bottom: 1px solid #222;
            padding-bottom: 8px;
        }

        .problem-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .problem-list li {
            padding: 12px 0;
            border-bottom: 1px solid #222;
            color: #eee;
            cursor: pointer;
            transition: color 0.2s;
        }

        .problem-list li:hover {
            color: var(--accent-primary);
        }

        .problem-list li:last-child {
            border-bottom: none;
        }

        .footer-rule {
            background-color: #2a2a2a;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: var(--text-secondary);
            position: relative;
        }

        .footer-content {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .rule-icon {
            color: #f1c40f;
            font-size: 20px;
        }

        .chevron-down {
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--container-bg);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--card-border);
            color: var(--text-dim);
            cursor: pointer;
        }

        @media (max-width: 1024px) {
            .day-grid {
                grid-template-columns: repeat(4, 1fr);
            }

            .platforms-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .day-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .platforms-container {
                grid-template-columns: 1fr;
            }

            .detail-title {
                font-size: 28px;
            }
        }
    </style>
</head>

<body>

            <div class="header-dots">•••</div>

        <div class="week-container" id="week-1">

            <div class="footer-rule">
                <div class="footer-content">
                    <span class="rule-icon">💡</span>
                    <span id="daily-rule"></span>
                </div>
                <div class="chevron-down">⬇</div>
            </div>
        </div>
    </div>

        const currentDayId = 1; // Start with Day 1 active

        function createDayCard(data) {
            return `
            <div class="day-card" id="day-${data.id}" onclick="selectDay(${data.id})">
                <div class="day-num">Day ${data.id}</div>
                <div class="card-pattern">${data.pattern}</div>
                <div class="status-dot ${data.id === currentDayId ? 'active' : ''}"></div>
            </div>
        `;
        }

        function renderGrids() {
            const grid1 = document.getElementById('day-grid-1');
            const grid2 = document.getElementById('day-grid-2');
            let grid1Html = '';
            let grid2Html = '';

            dsaData.forEach(day => {
                if (day.week === 1) {
                    grid1Html += createDayCard(day);
                } else {
                    grid2Html += createDayCard(day);
                }
            });

            grid1.innerHTML = grid1Html;
            grid2.innerHTML = grid2Html;
        }

        function selectDay(id) {
            // Remove active class from all cards and dots
            document.querySelectorAll('.day-card').forEach(card => card.classList.remove('active'));
            document.querySelectorAll('.status-dot').forEach(dot => dot.classList.remove('active'));

            // Add active class to selected card and its dot
            const selectedCard = document.getElementById(`day-${id}`);
            selectedCard.classList.add('active');
            selectedCard.querySelector('.status-dot').classList.add('active');

            populateDetailArea(id);
        }

        function populateDetailArea(id) {
            const data = dsaData.find(item => item.id === id);
            if (!data) return;

            // Show detail area
            document.getElementById('detail-area').classList.add('visible');

            // Update basic info
            document.getElementById('detail-day-tag').innerText = `Day ${data.id}`;
            document.getElementById('detail-title').innerText = data.pattern;
            document.getElementById('detail-subtitle').innerText = data.desc;
            document.getElementById('daily-rule').innerText = data.rule;

            // Update tags
            const tagContainer = document.getElementById('tag-container');
            let tagsHtml = '';
            data.tags.forEach(tag => {
                tagsHtml += `<div class="detail-tag">${tag}</div>`;
            });
            tagContainer.innerHTML = tagsHtml;

            // Update problem lists
            const createListItems = (list) => list.map(problem => `<li>${problem}</li>`).join('');
            document.getElementById('lc-problems').innerHTML = createListItems(data.lc);
            document.getElementById('cw-problems').innerHTML = createListItems(data.cw);
            document.getElementById('hr-problems').innerHTML = createListItems(data.hr);
        }

        // Initialize the app
        function init() {
            renderGrids();
            selectDay(currentDayId); // Set Day 1 as active initially
        }

        window.onload = init;
    </script>
